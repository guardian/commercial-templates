name: Deploy Test Templates to GAM

permissions:
  contents: read

concurrency:
  group: 'deploy-test'
  cancel-in-progress: true

on:
  pull_request:
    types: [labeled]

jobs:
  deploy-test:
    name: Deploy to Test
    runs-on: ubuntu-latest
    if: github.event.label.name == 'deploy-test'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - run: corepack enable
        shell: bash

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        shell: bash

      - name: Build
        run: pnpm build:templates

      - name: Deploy Templates to GAM (Test)
        run: pnpm deploy:gam:test --ci
        env:
          GAM_APPLICATION_NAME: ${{ secrets.GAM_APPLICATION_NAME }}
          GAM_NETWORK_CODE: ${{ secrets.GAM_NETWORK_CODE }}
          SERVICE_ACCOUNT_KEY_FILE: ${{ secrets.SERVICE_ACCOUNT_KEY_FILE }}
